apiVersion: kargo.akuity.io/v1alpha1
kind: ClusterPromotionTask
metadata:
  name: promote-app
spec:
  vars:
    - name: team
    - name: appName
    - name: appNamespace
    - name: env
    - name: gitRepo
    - name: imageRepo
    - name: chartRepo
    - name: chartName
    - name: baseWarehouse
      value: ${{ vars.appName }}-wh
    - name: stageWarehouse
      value: ${{ vars.appName }}-${{ vars.env }}-wh
    - name: appFolder
      value: projects/${{ vars.team }}/${{ vars.appName }}
    - name: baseValuesFile
      value: ${{ vars.appFolder }}/base/values.yaml
    - name: stageValuesFile
      value: ${{ vars.appFolder }}/${{ vars.env }}/values.yaml
    - name: manifestsFolder
      value: ${{ vars.appFolder }}/${{ vars.env }}/manifests
    - name: outputBranch
      value: stage/${{ vars.env }}

  steps:
    - uses: git-clone
      as: clone-base
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - commit: ${{ commitFrom(vars.gitRepo, warehouse(vars.baseWarehouse)).ID }}
            path: ./src-base
          - branch: ${{ vars.outputBranch }}
            create: true
            path: ./out

    - uses: git-clear
      config:
        path: ./out

    - if: ${{ commitFrom(vars.gitRepo, warehouse(vars.stageWarehouse)) != null }}
      uses: git-clone
      as: clone-stage
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - commit: ${{ commitFrom(vars.gitRepo, warehouse(vars.stageWarehouse)).ID }}
            path: ./src-stage

    # for the first promotion of Freight from the base warehouse clone main instead of stage
    - if: ${{ commitFrom(vars.gitRepo, warehouse(vars.stageWarehouse)) == null }}
      uses: git-clone
      as: clone-main
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
          - branch: main
            path: ./src-stage

    - uses: yaml-update
      as: update-image
      config:
        path: ./src-base/${{ vars.baseValuesFile }}
        updates:
          - key: deployment.image.tag
            value: ${{ imageFrom(vars.imageRepo, warehouse(vars.baseWarehouse)).Tag }}
          - key: deployment.image.repository
            value: ${{ imageFrom(vars.imageRepo).RepoURL }}

    - uses: http-download
      as: fetch-chart
      config:
        url: ${{ vars.chartRepo }}/${{ vars.chartName }}-${{ chartFrom(vars.chartRepo, vars.chartName).Version }}.tgz
        outPath: ./chart/${{ vars.chartName }}.tgz
        headers:
          - name: Accept
            value: application/gzip
        allowOverwrite: true

    - uses: untar
      as: extract-chart
      config:
        inPath: ./chart/${{ vars.chartName }}.tgz
        outPath: ./chart

    - uses: helm-template
      as: render
      config:
        path: ./chart/${{ vars.chartName }}
        releaseName: ${{ vars.appName }}
        namespace: ${{ vars.appNamespace }}
        valuesFiles:
          - ./src-base/${{ vars.baseValuesFile }}
          - ./src-stage/${{ vars.stageValuesFile }}
        outPath: ./out/${{ vars.manifestsFolder }}

    - uses: git-commit
      as: commit
      config:
        path: ./out
        message: >-
          ${{ vars.env }}: source-warehouse=${{ ctx.targetFreight.origin.name }}
            image=${{ imageFrom(vars.imageRepo, warehouse(vars.baseWarehouse)).Tag }}
            chart=${{ chartFrom(vars.chartRepo, vars.chartName).Version }}
            commit=${{ commitFrom(vars.gitRepo, warehouse(ctx.targetFreight.origin.name)).ID }}

    - uses: git-push
      config:
        path: ./out
        targetBranch: ${{ vars.outputBranch }}

    - uses: argocd-update
      config:
        apps:
          - name: ${{ vars.team }}-${{ vars.appName }}-${{ vars.env }}
